name: Update Dashboard

on:
  push:
    paths:
      - '**.xlsx'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install pandas openpyxl jinja2
        
      - name: Generate HTML
        run: python generate.py
        
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add crypto_loan_analysis.html
          git commit -m "Dashboard güncellendi" || exit 0
          git push
