<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Crypto Loan — Protected</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1e2130 0%, #2d3450 100%);
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .lock-box {
    background: #262c3d;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lock-icon {
    font-size: 48px;
    text-align: center;
    margin-bottom: 16px;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #e6edf3;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    background: #1e2130;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #e6edf3;
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: #58a6ff;
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 20px;
    user-select: none;
    cursor: pointer;
  }
  .remember input { cursor: pointer; }
  button {
    width: 100%;
    padding: 12px;
    background: #58a6ff;
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: #79c0ff; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: wait; }
  .error {
    margin-top: 14px;
    padding: 10px 12px;
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
    color: #ff7b72;
    font-size: 13px;
    display: none;
  }
  .error.show { display: block; }
  .loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(13,17,23,0.3);
    border-top-color: #0d1117;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="lock-box" id="lockBox">
  <div class="lock-icon">🔒</div>
  <h1>Crypto Loan Analysis</h1>
  <p class="subtitle">Bu içerik şifrelidir. Erişmek için parola girin.</p>

  <div class="field">
    <label for="pw">Parola</label>
    <input type="password" id="pw" autofocus autocomplete="current-password" />
  </div>

  <label class="remember">
    <input type="checkbox" id="remember" checked />
    Bu cihazda beni 30 gün hatırla
  </label>

  <button id="unlockBtn">Kilidi Aç</button>
  <div class="error" id="err"></div>
</div>

8t/fWDkHegGxu+oces=",
    iter: 600000
  };
  const STORAGE_KEY = "cla_unlock_v1";
  const REMEMBER_DAYS = 30;

  const pwInput  = document.getElementById("pw");
  const btn      = document.getElementById("unlockBtn");
  const errBox   = document.getElementById("err");
  const remember = document.getElementById("remember");

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function deriveKey(password, saltBytes) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: saltBytes, iterations: PAYLOAD.iter, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function decrypt(password) {
    const salt = b64ToBytes(PAYLOAD.salt);
    const iv   = b64ToBytes(PAYLOAD.iv);
    const ct   = b64ToBytes(PAYLOAD.ct);
    const key  = await deriveKey(password, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    return new TextDecoder().decode(plainBuf);
  }

  function renderHtml(html) {
    // document.open/write ile tüm sayfayı değiştir
    document.open();
    document.write(html);
    document.close();
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add("show");
  }

  function clearError() {
    errBox.classList.remove("show");
    errBox.textContent = "";
  }

  async function tryUnlock(password, fromRemembered) {
    clearError();
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Kilit açılıyor...';
    try {
      const html = await decrypt(password);
      if (remember && remember.checked && !fromRemembered) {
        const expires = Date.now() + REMEMBER_DAYS * 24 * 60 * 60 * 1000;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ p: password, e: expires }));
        } catch(e) {}
      }
      renderHtml(html);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Kilidi Aç";
      if (fromRemembered) {
        try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      } else {
        showError("Parola yanlış. Lütfen tekrar deneyin.");
        pwInput.select();
      }
    }
  }

  // Hatırlama kontrolü
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && obj.e && obj.e > Date.now() && obj.p) {
        tryUnlock(obj.p, true);
        return;
      } else {
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  } catch(e) {}

  btn.addEventListener("click", () => {
    const pw = pwInput.value;
    if (!pw) { showError("Parola boş olamaz."); return; }
    tryUnlock(pw, false);
  });

  pwInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") btn.click();
    else clearError();
  });
})();
</script>
